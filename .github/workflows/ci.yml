name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ── 1. Lint ──────────────────────────────────────────────────────────────────

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks (Secret Scanner)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false # golangci-lint-action owns the cache

      - uses: golangci/golangci-lint-action@v6
        with:
          version: latest


  # ── 2. Test ──────────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test -race -coverprofile=coverage.out ./...

      - uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out

  # ── 3. Docker build · Trivy scan · GHCR push ─────────────────────────────────
  docker:
    name: Build / Scan / Push
    runs-on: ubuntu-latest
    needs: [lint, test]
    permissions:
      contents: read
      packages: write       # push to GHCR
      security-events: write # upload SARIF to GitHub Security tab

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short

      - uses: docker/login-action@v3
        if: github.event_name != 'pull_request'
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build once into the local daemon so Trivy can scan it before pushing.
      - name: Build image (local)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: VERSION=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ fromJSON(steps.meta.outputs.json).tags[0] }}
          format: sarif
          output: trivy-results.sarif
          exit-code: "1"         # fail the job if findings exist
          ignore-unfixed: true   # skip CVEs with no fix yet
          severity: CRITICAL,HIGH

      # Upload SARIF to the Security tab regardless of whether the scan passed.
      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

      # Push every tag produced by metadata-action; layers are uploaded once.
      - name: Push to GHCR
        if: github.event_name != 'pull_request'
        run: |
          while IFS= read -r tag; do
            [ -n "$tag" ] && docker push "$tag"
          done <<< "${{ steps.meta.outputs.tags }}"
  # ── 4. Deploy ────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to EC2 via SSM
    runs-on: ubuntu-latest
    needs: docker
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::427763920651:role/insider-one
          aws-region: eu-central-1

      - name: Trigger Deploy via AWS SSM
        run: |
          aws ssm send-command \
            --instance-ids "i-05bf368f39ef7d16d" \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=["cd /home/ubuntu/insider-service && git pull", "helm upgrade --install insider-service ./insider-service -f ./insider-service/values-prod.yaml --set image.tag=${{ github.sha }} -n prod"]' \
            --comment "Deployed via GitHub Actions"
