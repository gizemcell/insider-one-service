name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ── 1. Lint ──────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks (Secret Scanner)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-go@v5
        with:
          go-version-file: app/go.mod
          cache: false # golangci-lint-action owns the cache

      - uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: app


  # ── 2. Test ──────────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: app/go.mod

      - name: Run tests
        working-directory: app
        run: go test -race -coverprofile=coverage.out ./...

      - name: Go vulnerability check
        working-directory: app
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...

      - uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: app/coverage.out

  # ── 3. Docker build · Trivy scan · GHCR push ─────────────────────────────────
  docker:
    name: Build / Scan / Push
    runs-on: ubuntu-latest
    needs: [lint, test]
    permissions:
      contents: read
      packages: write       # push to GHCR
      security-events: write # upload SARIF to GitHub Security tab

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern=v{{version}}
            type=semver,pattern=v{{major}}.{{minor}}
            type=sha,prefix=sha-,format=short

      - uses: docker/login-action@v3
        if: github.event_name != 'pull_request'
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build once into the local daemon so Trivy can scan it before pushing.
      - name: Build image (local)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: VERSION=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ fromJSON(steps.meta.outputs.json).tags[0] }}
          format: sarif
          output: trivy-results.sarif
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: os          # OS packages only; Go binary CVEs are caught by govulncheck
          severity: CRITICAL,HIGH

      # Upload SARIF to the Security tab regardless of whether the scan passed.
      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

      # Push every tag produced by metadata-action; layers are uploaded once.
      - name: Push to GHCR
        if: github.event_name != 'pull_request'
        run: |
          while IFS= read -r tag; do
            [ -n "$tag" ] && docker push "$tag"
          done <<< "${{ steps.meta.outputs.tags }}"
  # ── 4A. Update DEV manifest (main branch) ───────────────────────────────────
  update-dev-manifest:
    name: Update DEV Manifest
    runs-on: ubuntu-latest
    needs: docker

    if: github.ref == 'refs/heads/main'

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Update values-dev.yaml with SHA tag
        run: |
          sed -i "s/tag:.*/tag: sha-${GITHUB_SHA::7}/" chart/values-dev.yaml

      - name: Commit updated dev manifest
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add chart/values-dev.yaml

          git commit -m "chore(dev): update image tag to sha-${GITHUB_SHA::7}" || echo "No changes"

          git push

  # ── 4B. Update PROD manifest (release tags) ─────────────────────────────────
  update-prod-manifest:
    name: Update PROD Manifest
    runs-on: ubuntu-latest
    needs: docker

    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Update values-prod.yaml with semver tag
        run: |
          sed -i "s/tag:.*/tag: ${GITHUB_REF_NAME}/" chart/values-prod.yaml

      - name: Commit updated prod manifest
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add chart/values-prod.yaml

          git commit -m "release(prod): ${GITHUB_REF_NAME}" || echo "No changes"

          git push

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: |
            See CHANGELOG.md for release details.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
