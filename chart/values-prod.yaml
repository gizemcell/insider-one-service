replicaCount: 2

image:
  tag: v0.1.1
  pullPolicy: IfNotPresent

ingress:
  enabled: true
  className: nginx
  host: api.insider-service.com
  #tls:
  # - secretName: insider-service-tls
  #  hosts:
  #   - api.insider-service.com

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 2
  targetCPUUtilizationPercentage: 70

networkPolicy:
  enabled: true
  ingressControllerNamespace: ingress-nginx

podDisruptionBudget:
  enabled: true
  minAvailable: 2

resources:
  requests:
    cpu: 200m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi